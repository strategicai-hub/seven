version: "3.8"

x-common-env: &common-env
  - RABBITMQ_HOST=${RABBITMQ_HOST}
  - RABBITMQ_PORT=${RABBITMQ_PORT}
  - RABBITMQ_USER=${RABBITMQ_USER}
  - RABBITMQ_PASS=${RABBITMQ_PASS}
  - RABBITMQ_VHOST=${RABBITMQ_VHOST}
  - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
  - REDIS_HOST=${REDIS_HOST}
  - REDIS_PORT=${REDIS_PORT}
  - REDIS_PASSWORD=${REDIS_PASSWORD}
  - GEMINI_API_KEY=${GEMINI_API_KEY}
  - GEMINI_MODEL=${GEMINI_MODEL}
  - UAZAPI_BASE_URL=${UAZAPI_BASE_URL}
  - UAZAPI_TOKEN=${UAZAPI_TOKEN}
  - UAZAPI_INSTANCE=${UAZAPI_INSTANCE}
  - CLOUDGYM_UNIT_ID=${CLOUDGYM_UNIT_ID}
  - CLOUDGYM_V1_BASE=${CLOUDGYM_V1_BASE}
  - CLOUDGYM_V1_BASIC=${CLOUDGYM_V1_BASIC}
  - CLOUDGYM_V2_BASE=${CLOUDGYM_V2_BASE}
  - CLOUDGYM_V2_USERNAME=${CLOUDGYM_V2_USERNAME}
  - CLOUDGYM_V2_PASSWORD=${CLOUDGYM_V2_PASSWORD}
  - CLOUDGYM_PROXY=${CLOUDGYM_PROXY}
  - WEBHOOK_PATH=${WEBHOOK_PATH}
  - DEBOUNCE_SECONDS=${DEBOUNCE_SECONDS}
  - BLOCK_TTL_SECONDS=${BLOCK_TTL_SECONDS}
  - ALERT_PHONE=${ALERT_PHONE}
  - ALLOWED_PHONES=${ALLOWED_PHONES}
  - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}
  - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
  - SQLITE_PATH=${SQLITE_PATH}
  - SCHEDULER_TZ=${SCHEDULER_TZ}
  - FOLLOWUP_DRY_RUN=${FOLLOWUP_DRY_RUN}

services:
  seven-api:
    image: ghcr.io/gustavocastilho-hub/seven:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - network_public
    environment: *common-env
    volumes:
      - seven_sqlite:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.seven.rule=Host(`webhook-whatsapp.strategicai.com.br`) && PathPrefix(`/seven`)"
        - "traefik.http.routers.seven.entrypoints=websecure"
        - "traefik.http.routers.seven.tls=true"
        - "traefik.http.routers.seven.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.seven.loadbalancer.server.port=8000"

  seven-worker:
    image: ghcr.io/gustavocastilho-hub/seven:latest
    command: python worker.py
    networks:
      - network_public
    environment: *common-env
    volumes:
      - seven_sqlite:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

  seven-scheduler:
    image: ghcr.io/gustavocastilho-hub/seven:latest
    command: python scheduler.py
    networks:
      - network_public
    environment: *common-env
    volumes:
      - seven_sqlite:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

volumes:
  seven_sqlite:
    driver: local

networks:
  network_public:
    external: true
